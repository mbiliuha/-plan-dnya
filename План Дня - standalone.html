document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ght);\n  color: var(--cube-dark-text);\n}\n\n/* src/components/Input.css */\n.cube-field {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  font-family: var(--cube-font-body);\n  max-width: 360px;\n}\n.cube-field__label {\n  font-size: var(--cube-text-sm);\n  font-weight: 700;\n  color: var(--cube-dark-text);\n}\n.cube-field__input {\n  font-family: var(--cube-font-body);\n  font-size: var(--cube-text-base);\n  padding: 11px 14px;\n  border: 1px solid #cfcfcf;\n  border-radius: var(--cube-radius);\n  background: var(--cube-white);\n  color: var(--cube-dark-text);\n  transition: border-color var(--cube-transition);\n}\n.cube-field__input:focus {\n  outline: none;\n  border-color: var(--cube-blue);\n  box-shadow: 0 0 0 3px rgba(51, 187, 255, 0.18);\n}\n.cube-field__hint {\n  margin: 0;\n  font-size: var(--cube-text-xs);\n  color: var(--cube-gray-text);\n}\n.cube-field--error .cube-field__input {\n  border-color: var(--cube-red);\n}\n.cube-field--error .cube-field__hint {\n  color: var(--cube-red);\n}\n\n/* src/components/Card.css */\n.cube-card {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  text-align: center;\n  gap: 10px;\n  padding: var(--cube-space-lg) var(--cube-space-md);\n  background: var(--cube-white);\n  border: 1px solid var(--cube-light);\n}\n.cube-card__icon {\n  width: 64px;\n  height: 64px;\n  border-radius: var(--cube-radius-round);\n  background: var(--cube-light);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 28px;\n  margin-bottom: 4px;\n}\n.cube-card__title {\n  font-family: var(--cube-font-display);\n  font-weight: 400;\n  font-size: var(--cube-display-sm);\n  margin: 0;\n  color: var(--cube-dark-text);\n}\n.cube-card__desc {\n  font-family: var(--cube-font-body);\n  font-size: var(--cube-text-sm);\n  color: var(--cube-gray-text);\n  margin: 0;\n  line-height: 1.6;\n}\n.cube-card__action {\n  margin-top: 8px;\n}\n\n/* src/components/Header.css */\n.cube-header {\n  font-f sor:pointer;background:{{ chip.bg }};white-space:nowrap;font-weight:{{ chip.weight }};\">{{ chip.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;\">\n          <input type=\"text\" value=\"{{ searchText }}\" sc-camel-on-change=\"{{ onSearchChange }}\" placeholder=\"Пошук по назві/деталях...\" style=\"min-width:180px;padding:9px 12px;font-size:var(--cube-text-sm);border:1px solid #cfcfcf;background:var(--cube-white);\">\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <span style=\"font-size:var(--cube-text-xs);color:var(--cube-success);\">{{ saveStatusText }}<\u002Fspan>\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" variant=\"ghost\" sc-camel-on-click=\"{{ clearAll }}\" hint-size=\"auto,36px\">Очистити все<\u002Fx-import>\n        <\u002Fdiv>\n\n        <div style=\"overflow-x:auto;border:1px solid #e2e2e2;\">\n          <sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:var(--cube-text-sm);\">\n            <sc-raw-thead>\n              <sc-raw-tr>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\"><\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">Дата<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">Час<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">Назва<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">а/лпр<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">Ім'я<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">Телефон<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\">Деталі<\u002Fsc-raw-th>\n                <sc-raw-th style=\"font-size:10px;text-transform:uppercase;color:var(--cube-gray-text);text-align:left;padding:9px 10px;border-bottom:2px solid #e2e2e2;background:#f7f7f7;\"><\u002Fsc-raw-th>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-raw-thead>\n            <sc-raw-tbody>\n              <sc-for list=\"{{ tableRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                <sc-raw-tr style=\"opacity:{{ row.rowOpacity }};background:{{ row.rowBg }};\">\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;background:{{ row.cellBg }};\"><input type=\"checkbox\" checked=\"{{ row.done }}\" sc-camel-on-change=\"{{ row.onToggleDone }}\"><\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;font-weight:700;white-space:nowrap;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\">{{ row.dateStr }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;font-weight:700;white-space:nowrap;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\">{{ row.time }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;font-weight:600;min-width:140px;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\">{{ row.name }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;font-size:10px;color:var(--cube-gray-text);text-transform:uppercase;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\">{{ row.role }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\">{{ row.contactName }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\"><a href=\"{{ row.telHref }}\">{{ row.phone }}<\u002Fa><\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;color:var(--cube-gray-text);max-width:360px;background:{{ row.cellBg }};text-decoration:{{ row.strike }};\">{{ row.details }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"padding:8px 10px;border-bottom:1px solid #ececec;white-space:nowrap;text-align:right;background:{{ row.cellBg }};\"><button sc-camel-on-click=\"{{ row.onDelete }}\" style=\"background:none;border:none;color:var(--cube-gray-text);cursor:pointer;font-size:15px;\">✕<\u002Fbutton><\u002Fsc-raw-td>\n                <\u002Fsc-raw-tr>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showEmptyBoardHint }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"color:var(--cube-gray-text);font-size:var(--cube-text-sm);font-style:italic;margin-top:10px;\">{{ emptyBoardHintText }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;\" sc-camel-on-click=\"{{ onOverlayClick }}\">\n    <div style=\"background:var(--cube-white);border:1px solid #e2e2e2;padding:24px;max-width:640px;width:100%;max-height:80vh;display:flex;flex-direction:column;\" sc-camel-on-click=\"{{ stopProp }}\">\n      <h3 style=\"font-family:var(--cube-font-display);font-weight:400;font-size:var(--cube-display-sm);text-transform:uppercase;margin:0 0 12px;color:var(--cube-navy);\">{{ modalTitle }}<\u002Fh3>\n      <sc-if value=\"{{ modalIsText }}\" hint-placeholder-val=\"{{ false }}\">\n        <textarea sc-camel-read-only=\"{{ true }}\" ref=\"{{ modalTextareaRef }}\" value=\"{{ modalTextareaValue }}\" style=\"width:100%;flex:1;min-height:180px;background:#f7f7f7;border:1px solid #cfcfcf;color:var(--cube-dark-text);font-family:monospace;font-size:12px;padding:10px;resize:vertical;\"><\u002Ftextarea>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ modalIsPlain }}\" hint-placeholder-val=\"{{ true }}\">\n        <p style=\"font-size:var(--cube-text-sm);color:var(--cube-gray-text);margin:0 0 12px;line-height:1.5;white-space:pre-line;\">{{ modalText }}<\u002Fp>\n      <\u002Fsc-if>\n      <div style=\"font-size:var(--cube-text-xs);color:var(--cube-success);margin-top:8px;min-height:16px;\">{{ modalCopyHint }}<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap;\">\n        <sc-if value=\"{{ showClearCopiedBtn }}\" hint-placeholder-val=\"{{ false }}\">\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" variant=\"ghost\" sc-camel-on-click=\"{{ onClearCopied }}\" hint-size=\"auto,40px\">Видалити скопійовані записи<\u002Fx-import>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showTextFallbackBtn }}\" hint-placeholder-val=\"{{ false }}\">\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" variant=\"ghost\" sc-camel-on-click=\"{{ onShowTextFallback }}\" hint-size=\"auto,40px\">Скопіювати як текст<\u002Fx-import>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ modalIsText }}\" hint-placeholder-val=\"{{ false }}\">\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" variant=\"ghost\" sc-camel-on-click=\"{{ closeModal }}\" hint-size=\"auto,40px\">Закрити<\u002Fx-import>\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" sc-camel-on-click=\"{{ onModalCopyClick }}\" hint-size=\"auto,40px\">Копіювати як текст<\u002Fx-import>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ modalIsConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" variant=\"ghost\" sc-camel-on-click=\"{{ closeModal }}\" hint-size=\"auto,40px\">Скасувати<\u002Fx-import>\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" sc-camel-on-click=\"{{ onConfirmClear }}\" hint-size=\"auto,40px\">Так, очистити<\u002Fx-import>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ modalIsInfo }}\" hint-placeholder-val=\"{{ false }}\">\n          <x-import component-from-global-scope=\"CubeOnlineDS.Button\" sc-camel-on-click=\"{{ closeModal }}\" hint-size=\"auto,40px\">Зрозуміло<\u002Fx-import>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst MONTHS = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];\nconst WEEKDAY_STEMS = [['понеділ',1],['вівтор',2],['серед',3],['четвер',4],[\"п'ятниц\",5],['пятниц',5],['субот',6],['неділ',0]];\nconst WEEKDAY_ABBR = {'пн':1,'вт':2,'ср':3,'чт':4,'пт':5,'сб':6,'нд':0};\nconst colorToType = { red:'refusal', cyan:'call', yellow:'meeting', green:'deal', none:'none' };\nconst REFUSAL_STEMS = ['відмов','не цікав','нецікав','не потрібн','не актуальн','не на часі','нічого не хоче','нічого не буде','нічого робити не','нічого поки не','поки нічого не'];\nconst CALL_STEMS = ['дз','нбт','дзвін','передзвон','перенабер','набрати','набрать','зателефон','подзвон','телефонувати','набер','відповідь','зайти','зайди','підійти',\"зв'яж\"];\nconst DEAL_STEMS = ['пано','nfc','нфс','ads','адс'];\nconst DATEISH = /^\\d{1,2}[.\\/]\\d{1,2}\\.?$/;\nconst TIMEISH = /^\\d{1,2}:\\d{2}$/;\n\nfunction pad2(n){ return String(n).padStart(2,'0'); }\nfunction isoFromParts(y,mZero,d){ return y+'-'+pad2(mZero+1)+'-'+pad2(d); }\nfunction dateToISO(dt){ return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate()); }\nfunction addDays(iso,n){ const p=iso.split('-').map(Number); const dt=new Date(p[0],p[1]-1,p[2]); dt.setDate(dt.getDate()+n); return dateToISO(dt); }\nfunction todayISO(){ return dateToISO(new Date()); }\nfunction isoToDMY(iso){ const p=iso.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }\nfunction isoToDMShort(iso){ const p=iso.split('-').map(Number); return p[2]+'.'+p[1]; }\nfunction isoValid(s){ return typeof s === 'string' && /^\\d{4}-\\d{2}-\\d{2}$/.test(s); }\n\nfunction parseDateHeaderToISO(str){\n  const low = str.toLowerCase();\n  const m = low.match(/(\\d{1,2})\\s+(січня|лютого|березня|квітня|травня|червня|липня|серпня|вересня|жовтня|листопада|грудня)\\s+(\\d{4})/);\n  if(m){\n    const day = parseInt(m[1],10);\n    const monthIdx = MONTHS.indexOf(m[2]);\n    const year = parseInt(m[3],10);\n    if(monthIdx!==-1) return isoFromParts(year, monthIdx, day);\n  }\n  return null;\n}\nfunction parseNumericDateToISO(str){\n  const m = str.trim().match(/^(\\d{1,2})[.\\/](\\d{1,2})[.\\/](\\d{2}|\\d{4})$/);\n  if(!m) return null;\n  const day = parseInt(m[1],10), month = parseInt(m[2],10);\n  let year = parseInt(m[3],10);\n  if(m[3].length===2) year = 2000+year;\n  return isoFromParts(year, month-1, day);\n}\nfunction parseAnyDateHeader(cells){\n  const byMonth = parseDateHeaderToISO(cells.join(' '));\n  if(byMonth) return byMonth;\n  const numericCell = cells.find(function(c){ return /^\\d{1,2}[.\\/]\\d{1,2}[.\\/]\\d{2,4}$/.test(c.trim()); });\n  if(numericCell) return parseNumericDateToISO(numericCell.trim());\n  const bareCell = cells.find(function(c){ return /^\\d{1,2}[.\\/]\\d{1,2}\\.?$/.test(c.trim()); });\n  if(bareCell){\n    const m = bareCell.trim().match(/^(\\d{1,2})[.\\/](\\d{1,2})\\.?$/);\n    const year = new Date().getFullYear();\n    return isoFromParts(year, parseInt(m[2],10)-1, parseInt(m[1],10));\n  }\n  return null;\n}\nfunction nextWeekday(referenceISO, targetDow){\n  const p = referenceISO.split('-').map(Number);\n  let dt = new Date(p[0],p[1]-1,p[2]);\n  do{ dt.setDate(dt.getDate()+1); } while(dt.getDay()!==targetDow);\n  return dateToISO(dt);\n}\nfunction levenshtein(a,b){\n  const m=a.length, n=b.length;\n  if(m===0) return n; if(n===0) return m;\n  let prev = new Array(n+1); for(let j=0;j<=n;j++) prev[j]=j;\n  for(let i=1;i<=m;i++){\n    const cur = new Array(n+1); cur[0]=i;\n    for(let j=1;j<=n;j++){\n      const cost = a[i-1]===b[j-1] ? 0 : 1;\n      cur[j] = Math.min(cur[j-1]+1, prev[j]+1, prev[j-1]+cost);\n    }\n    prev = cur;\n  }\n  return prev[n];\n}\nfunction fuzzyHasWord(tokens, target, maxDist){\n  return tokens.some(function(t){ return Math.abs(t.length-target.length)<=maxDist && levenshtein(t,target)<=maxDist; });\n}\nfunction extractTokens(text){ return (text.toLowerCase().match(/[а-щьюяєіїґ'ʼ]+/g)) || []; }\nfunction resolveRelativeDate(text, referenceISO){\n  if(!text) return null;\n  const low = text.toLowerCase();\n  const ref = referenceISO || todayISO();\n  const tokens = extractTokens(low);\n  if(low.includes('післязавтра') || fuzzyHasWord(tokens,'післязавтра',2)) return addDays(ref,2);\n  if(low.includes('завтра') || fuzzyHasWord(tokens,'завтра',1)) return addDays(ref,1);\n  if(low.includes('сьогодні') || fuzzyHasWord(tokens,'сьогодні',2)) return ref;\n  for(let i=0;i<WEEKDAY_STEMS.length;i++){ if(low.includes(WEEKDAY_STEMS[i][0])) return nextWeekday(ref, WEEKDAY_STEMS[i][1]); }\n  for(let i=0;i<tokens.length;i++){ if(Object.prototype.hasOwnProperty.call(WEEKDAY_ABBR, tokens[i])) return nextWeekday(ref, WEEKDAY_ABBR[tokens[i]]); }\n  const dmy = low.match(/\\b(\\d{1,2})[.\\/](\\d{1,2})[.\\/](\\d{4})\\b/);\n  if(dmy) return isoFromParts(parseInt(dmy[3],10), parseInt(dmy[2],10)-1, parseInt(dmy[1],10));\n  const dm = low.match(/\\b(\\d{1,2})[.\\/](\\d{1,2})\\b/);\n  if(dm){\n    const refYear = parseInt(ref.split('-')[0],10);\n    let iso = isoFromParts(refYear, parseInt(dm[2],10)-1, parseInt(dm[1],10));\n    if(iso < ref) iso = isoFromParts(refYear+1, parseInt(dm[2],10)-1, parseInt(dm[1],10));\n    return iso;\n  }\n  return null;\n}\nfunction formatDisplayLabel(iso){\n  const t = todayISO(), tm = addDays(t,1);\n  if(iso===t) return 'Сьогодні · '+isoToDMY(iso);\n  if(iso===tm) return 'Завтра · '+isoToDMY(iso);\n  const p = iso.split('-').map(Number);\n  const dt = new Date(p[0],p[1]-1,p[2]);\n  const WD_SHORT = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];\n  return WD_SHORT[dt.getDay()]+' · '+isoToDMY(iso);\n}\nfunction parseColor(str){\n  if(!str) return null;\n  str = str.trim().toLowerCase();\n  let m = str.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);\n  if(m){\n    let hex = m[1];\n    if(hex.length===3) hex = hex.split('').map(function(c){return c+c;}).join('');\n    const num = parseInt(hex,16);\n    return [(num>>16)&255,(num>>8)&255,num&255];\n  }\n  m = str.match(/^rgba?\\(([^)]+)\\)$/i);\n  if(m){\n    const parts = m[1].split(',').map(function(s){return parseFloat(s.trim());});\n    if(parts.length>=3 && !parts.some(isNaN)) return [parts[0],parts[1],parts[2]];\n  }\n  return null;\n}\nfunction bucketColor(rgb){\n  if(!rgb) return 'none';\n  const r=rgb[0], g=rgb[1], b=rgb[2];\n  if(r>235 && g>235 && b>235) return 'none';\n  const max = Math.max(r,g,b), min = Math.min(r,g,b);\n  if(max-min < 18 && max>190) return 'none';\n  if(r>150 && g<150 && b<150) return 'red';\n  if(r>150 && g>150 && b<130) return 'yellow';\n  if(g>140 && b>140 && r<150) return 'cyan';\n  if(g>140 && r<150 && b<150) return 'green';\n  if(r>=g && r>=b) return 'red';\n  if(g>=r && g>=b && b>100) return 'cyan';\n  if(g>=r && g>=b) return 'green';\n  return 'none';\n}\nfunction isDateHeaderCells(cells){\n  const joined = cells.join(' ').toLowerCase();\n  const nonEmpty = cells.filter(function(c){return c.trim();}).length;\n  if(nonEmpty>2) return false;\n  if(/\\d{1,2}\\s+(січня|лютого|березня|квітня|травня|червня|липня|серпня|вересня|жовтня|листопада|грудня)\\s+\\d{4}/.test(joined)) return true;\n  return cells.some(function(c){ return /^\\d{1,2}[.\\/]\\d{1,2}([.\\/]\\d{2,4})?\\.?$/.test(c.trim()); });\n}\nfunction isColumnHeaderCells(cells){\n  const joined = cells.join(' ').toLowerCase();\n  return joined.includes('час до') || (joined.includes('назва') && joined.includes('деталі'));\n}\nfunction extractTime(details){\n  const re = /(\\d{1,2}):(\\d{2})/g;\n  let m;\n  while((m = re.exec(details)) !== null){\n    const h = parseInt(m[1],10), mi = parseInt(m[2],10);\n    if(h>=0 && h<24 && mi>=0 && mi<60) return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');\n  }\n  const bare = details.match(/(?:^|\\s)(?:о|об|в|до)\\s+(\\d{1,2})(?!\\d)/i);\n  if(bare){\n    const h = parseInt(bare[1],10);\n    if(h>=0 && h<24) return String(h).padStart(2,'0')+':00';\n  }\n  return null;\n}\nfunction normalizeApostrophes(s){ return s.replace(/[\\u2019\\u02BC\\u0060\\u00B4]/g, \"'\"); }\nfunction classifyByKeywords(details){\n  const low = normalizeApostrophes(details.toLowerCase());\n  if(REFUSAL_STEMS.some(function(s){return low.includes(s);})) return 'refusal';\n  if(CALL_STEMS.some(function(s){return low.includes(s);})) return 'call';\n  if(low.includes('зуст')) return 'meeting';\n  const tokens = extractTokens(low);\n  if(tokens.indexOf('міт')!==-1) return 'meeting';\n  if(fuzzyHasWord(tokens,'зустріч',2)) return 'meeting';\n  if(!low.includes('дум') && DEAL_STEMS.some(function(s){return low.includes(s);})) return 'deal';\n  return 'none';\n}\nfunction alignRow(cells){\n  const n = cells.length;\n  function get(idxFromEnd){ return n-idxFromEnd>=0 ? (cells[n-idxFromEnd]||'') : ''; }\n  return {\n    timeFrom: get(7).trim(), timeTo: get(6).trim(), name: get(5).trim(),\n    role: get(4).trim(), contactName: get(3).trim(), phone: get(2).trim(), details: get(1).trim()\n  };\n}\nfunction parseHtmlRows(html){\n  const doc = new DOMParser().parseFromString(html, 'text/html');\n  const trs = Array.from(doc.querySelectorAll('tr'));\n  return trs.map(function(tr){\n    return Array.from(tr.children).map(function(td){\n      const style = td.getAttribute('style') || '';\n      const m = style.match(/background-color:\\s*([^;]+)/i);\n      return { text: (td.textContent||'').replace(/\\s+/g,' ').trim(), bg: m ? m[1].trim() : null };\n    });\n  });\n}\nfunction parseDMAnchored(str, refISO){\n  const m = str.trim().match(/^(\\d{1,2})[.\\/](\\d{1,2})\\.?$/);\n  if(!m) return null;\n  const refYear = parseInt((refISO||todayISO()).split('-')[0],10);\n  return isoFromParts(refYear, parseInt(m[2],10)-1, parseInt(m[1],10));\n}\nfunction segmentHasNumericDate(seg){ return /\\b\\d{1,2}[.\\/]\\d{1,2}\\b/.test(seg); }\nfunction findDateTimeInSegments(text, anchorBase){\n  const segments = text.split(';').map(function(s){return s.trim();}).filter(function(s){return s.length>0;});\n  for(let i=segments.length-1;i>=0;i--){\n    const seg = segments[i];\n    const resolved = resolveRelativeDate(seg, anchorBase);\n    if(resolved){\n      return { dateISO: resolved, time: extractTime(seg) || '', explicit: segmentHasNumericDate(seg) };\n    }\n  }\n  return null;\n}\nfunction resolveTargetFromDetails(details, fallbackAnchorISO){\n  const trimmed = details.trim();\n  const anchorBase = fallbackAnchorISO || todayISO();\n  const leadMatch = trimmed.match(/^(\\d{1,2})[.\\/](\\d{1,2})(?:[.\\/]\\d{2,4})?(\\s+(\\d{1,2}):(\\d{2}))?/);\n  if(!leadMatch) return null;\n  const day = parseInt(leadMatch[1],10), month = pa ateISO);\n    if(found && found.explicit && found.dateISO > loggedDateISO){\n      type = 'call';\n      targetDateISO = found.dateISO;\n      time = found.time || '';\n      dateExplicit = true;\n    }\n  }\n  if(type==='refusal' || type==='deal') return { skipped:true };\n  if(type==='call' && targetDateISO && targetDateISO===loggedDateISO && !dateExplicit){\n    targetDateISO = addDays(targetDateISO, 1);\n  }\n  return {\n    name:a.name, role:a.role, contactName:a.contactName, phone:a.phone,\n    details:a.details, type:type, time:time,\n    loggedDateISO: loggedDateISO, targetDateISO: targetDateISO, manualLabel: null,\n    include: (type==='meeting' || type==='call')\n  };\n}\nfunction processRowsGeneric(rowsWithBg){\n  let currentDateHeaderISO = null;\n  const out = [];\n  let skippedCount = 0;\n  for(let i=0;i<rowsWithBg.length;i++){\n    const row = rowsWithBg[i];\n    const cellsText = row.cellsText;\n    if(cellsText.every(function(c){return !c.trim();})) continue;\n    if(isDateHeaderCells(cellsText)){ currentDateHeaderISO = parseAnyDateHeader(cellsText); continue; }\n    if(isColumnHeaderCells(cellsText)) continue;\n    const nonEmpty = cellsText.filter(function(c){return c.trim();}).length;\n    if(nonEmpty < 2) continue;\n    let counts = {};\n    for(let j=0;j<row.cellsBg.length;j++){\n      const rgb = parseColor(row.cellsBg[j]);\n      const b = bucketColor(rgb);\n      if(b!=='none') counts[b]=(counts[b]||0)+1;\n    }\n    let bucket = 'none', best = 0;\n    for(const k in counts){ if(counts[k]>best){ best=counts[k]; bucket=k; } }\n    const loggedISO = currentDateHeaderISO || todayISO();\n    const entry = buildEntryFromRow(cellsText, bucket, loggedISO);\n    if(!entry) continue;\n    if(entry.skipped){ skippedCount++; continue; }\n    out.push(entry);\n  }\n  return { entries: out, skipped: skippedCount };\n}\nfunction timeToMinutes(t){\n  if(!t) return 99999;\n  const m = t.match(/(\\d{1,2}):(\\d{2})/);\n  if(!m) return 99999;\n  return parseInt(m[1],10)*60+parseInt(m[2],10);\n}\nfunction groupKeyFor(e){\n  if(e.manualLabel) return 'M:'+e.manualLabel;\n  if(e.targetDateISO) return e.targetDateISO;\n  return 'UNCERTAIN';\n}\nfunction groupLabelFor(key){\n  if(key==='UNCERTAIN') return 'Уточнити дату';\n  if(key.indexOf('M:')===0) return key.slice(2);\n  if(isoValid(key)) return formatDisplayLabel(key);\n  return key;\n}\nfunction swatchColorFor(type){\n  return {meeting:'var(--cube-warning)',call:'var(--cube-blue)',deal:'var(--cube-success)',refusal:'var(--cube-red)',none:'#999999'}[type];\n}\nfunction previewDayText(p){\n  if(p.manualLabel) return p.manualLabel;\n  if((p.type==='meeting'||p.type==='call')){\n    return p.targetDateISO ? formatDisplayLabel(p.targetDateISO) : 'Уточнити дату';\n  }\n  return formatDisplayLabel(p.loggedDateISO);\n}\nfunction escapeForDisplay(s){ return s || ''; }\n\nconst STORAGE_KEY = 'plan-entries';\n\nclass Component extends DCLogic {\n  state = {\n    entries: [], preview: [], activeDayKey: 'ALL', searchText: '',\n    pasteStatusText: '', pasteStatusWarn: false, pasteZoneEmpty: true,\n    saveStatusText: '', now: new Date(), storageAvailable: true,\n    modal: null\n  };\n\n  constructor(props){\n    super(props);\n    this.pasteZoneRef = React.createRef();\n    this.modalTextareaRef = React.createRef();\n  }\n\n  async componentDidMount(){\n    await this.loadEntries();\n    this.forceUpdate();\n    this._clockTimer = setInterval(() => this.setState({ now: new Date() }), 30000);\n  }\n  componentWillUnmount(){\n    if(this._clockTimer) clearInterval(this._clockTimer);\n  }\n\n  async loadEntries(){\n    try{\n      if(!window.storage || typeof window.storage.get !== 'function'){ this.state.storageAvailable = false; return; }\n      const res = await window.storage.get(STORAGE_KEY, false);\n      if(res && res.value) this.state.entries = JSON.parse(res.value);\n    }catch(err){ this.state.entries = []; }\n  }\n\n  async saveEntries(){\n    if(!this.state.storageAvailable){ }\n    this.setState({ preview: newPreview, pasteStatusText: statusText, pasteStatusWarn: warn, pasteZoneEmpty: true });\n  };\n\n  handlePasteZoneInput = () => {\n    const empty = !(this.pasteZoneRef.current && this.pasteZoneRef.current.textContent.trim());\n    this.setState({ pasteZoneEmpty: empty });\n  };\n\n  resetPasteZone = () => {\n    if(this.pasteZoneRef.current) this.pasteZoneRef.current.textContent = '';\n    this.setState({ pasteZoneEmpty: true, pasteStatusText: '' });\n  };\n\n  cancelPreview = () => {\n    this.setState({ preview: [], pasteStatusText: '' });\n  };\n\n  commitPreview = async () => {\n    const toAdd = this.state.preview.filter(function(p){return p.include;}).map(function(p){\n      return {\n        id:'e'+Date.now()+Math.random().toString(36).slice(2,7),\n        name:p.name, role:p.role, contactName:p.contactName, phone:p.phone,\n        details:p.details, type:p.type, time:p.time,\n        loggedDateISO:p.loggedDateISO, targetDateISO:p.targetDateISO, manualLabel:p.manualLabel,\n        done:false\n      };\n    });\n    this.state.entries = this.state.entries.concat(toAdd);\n    await this.saveEntries();\n    this.setState({ preview: [], pasteStatusText: '' });\n  };\n\n  updatePreviewAt(idx, patch){\n    const preview = this.state.preview.slice();\n    preview[idx] = Object.assign({}, preview[idx], patch);\n    this.setState({ preview });\n  }\n\n  toggleDone = async (id) => {\n    const e = this.state.entries.find(function(x){return x.id===id;});\n    if(e) e.done = !e.done;\n    await this.saveEntries();\n    this.forceUpdate();\n  };\n  deleteEntry = async (id) => {\n    this.state.entries = this.state.entries.filter(function(x){return x.id!==id;});\n    await this.saveEntries();\n    this.forceUpdate();\n  };\n\n  onSearchChange = (e) => { this.setState({ searchText: e.target.value }); };\n\n  currentFilteredEntries(){\n    const search = this.state.searchText.trim().toLowerCase();\n    return this.state.entries.filter((e) => n    return table;\n  }\n  copyPlanRich(items){\n    const table = this.buildCopyTable(items);\n    table.style.position = 'fixed'; table.style.left = '-9999px'; table.style.top = '0';\n    document.body.appendChild(table);\n    const range = document.createRange();\n    range.selectNodeContents(table);\n    const sel = window.getSelection();\n    sel.removeAllRanges(); sel.addRange(range);\n    let success = false;\n    try{ success = document.execCommand('copy'); }catch(err){ success = false; }\n    sel.removeAllRanges();\n    document.body.removeChild(table);\n    return success;\n  }\n  buildPlainText(items){\n    let text = 'дата\\tчас\\tНазва\\tа/лпр\\tІм\\'я\\tТелефон\\tДеталі\\n';\n    items.forEach(function(e){\n      const dateStr = e.targetDateISO ? isoToDMShort(e.targetDateISO) : '';\n      text += [dateStr, e.time||'', e.name||'', e.role||'', e.contactName||'', e.phone||'', e.details||''].join('\\t') + '\\n';\n    });\n    return text;\n  }\n\n  copyPlan = () => {\n    const items = this.currentFilteredEntries().filter(function(e){ return (e.type==='meeting'||e.type==='call') && !e.done; })\n      .sort(function(a,b){\n        const ka = a.targetDateISO || '9999-99-99', kb = b.targetDateISO || '9999-99-99';\n        if(ka!==kb) return ka.localeCompare(kb);\n        return timeToMinutes(a.time)-timeToMinutes(b.time);\n      });\n    if(items.length===0){\n      this.setState({ modal: { kind:'info', title:'План порожній', text:'Немає жодного запису для копіювання (з урахуванням поточних фільтрів).' } });\n      return;\n    }\n    const copiedIds = items.map(function(e){return e.id;});\n    const success = this.copyPlanRich(items);\n    if(success){\n      this.setState({ modal: {\n        kind:'info', title:'Скопійовано',\n        text:'Скопійовано '+items.length+' записів з кольором (жовтий — зустріч, синій — дзвінок). Встав (Ctrl+V) прямо в потрібне місце в Google Таблиці — колір комірок має зберегтись.\\n\\nЯкщо після вставки колір не зберігся — натисни кнопку нижче, щоб скопіювати звичайним текстом. Коли переконаєшся, що вставка пройшла успішно — можеш видалити ці записи з планувальника.',\n        copiedIds: copiedIds, showClearCopied: true, showTextFallback: true, plainItems: items\n      } });\n    } else {\n      this.setState({ modal: {\n        kind:'text', title:'План (текстом)', textareaValue: this.buildPlainText(items),\n        copiedIds: copiedIds, showClearCopied: true\n      } });\n    }\n  };\n\n  onShowTextFallback = () => {\n    const m = this.state.modal;\n    this.setState({ modal: { kind:'text', title:'План (текстом)', textareaValue: this.buildPlainText(m.plainItems), copiedIds: m.copiedIds, showClearCopied: true, copyHint:'Текст нижче виділено — Ctrl+C, щоб скопіювати, якщо кнопка не спрацює.' } });\n  };\n  onModalCopyClick = () => {\n    if(this.modalTextareaRef.current){\n      this.modalTextareaRef.current.focus();\n      this.modalTextareaRef.current.select();\n      let done = false;\n      try{ done = document.execCommand('copy'); }catch(err){ done = false; }\n      this.setState({ modal: Object.assign({}, this.state.modal, { copyHint: done ? '✓ Скопійовано в буфер обміну.' : 'Не вдалося скопіювати автоматично — текст виділено, натисни Ctrl+C.' }) });\n    }\n  };\n  onClearCopied = async () => {\n    const ids = this.state.modal.copiedIds || [];\n    this.state.entries = this.state.entries.filter(function(e){ return ids.indexOf(e.id)===-1; });\n    await this.saveEntries();\n    this.setState({ modal: null });\n  };\n\n  renderVals(){\n    const now = this.state.now;\n    const clockTime = now.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});\n    const clockDate = now.toLocaleDateString('uk-UA',{weekday:'long',day:'numeric',month:'long'});\n\n    const previewRows = this.state.preview.map((p, idx) => ({\n      include: p.include,\n      swatch: swatchColorFor(p.type),\n      nameLabel: (p.name || '(без назви)') + (p.contactName ? (' — ' + p.contactName) : ''),\n      type: p.type,\n      details: p.details,\n      dayText: previewDayText(p),\n      time: p.time || '',\n      onToggleInclude: (e) => this.updatePreviewAt(idx, { include: e.target.checked }),\n      onTypeChange: (e) => this.updatePreviewAt(idx, { type: e.target.value }),\n      onDayChange: (e) => {\n        const p2 = this.state.preview[idx];\n        const resolved = resolveRelativeDate(e.target.value, p2.loggedDateISO);\n        if(resolved){\n          if(p2.type==='meeting'||p2.type==='call') this.updatePreviewAt(idx, { targetDateISO: resolved, manualLabel: null });\n          else this.updatePreviewAt(idx, { loggedDateISO: resolved, manualLabel: null });\n        } else {\n          this.updatePreviewAt(idx, { manualLabel: e.target.value.trim() });\n        }\n      },\n      onTimeChange: (e) => this.updatePreviewAt(idx, { time: e.target.value }),\n      onRemove: () => { const preview = this.state.preview.slice(); preview.splice(idx,1); this.setState({ preview }); }\n    }));\n\n    const keys = Array.from(new Set(this.state.entries.map(groupKeyFor)));\n    keys.sort(function(a,b){\n      if(a==='UNCERTAIN') return 1; if(b==='UNCERTAIN') return -1;\n      const aIso = isoValid(a), bIso = isoValid(b);\n      if(aIso && bIso) return a.localeCompare(b);\n      if(aIso) return -1; if(bIso) return 1;\n      return a.localeCompare(b);\n    });\n    const chipList = [{key:'ALL',label:'Усі'}].concat(keys.map(function(k){return {key:k,label:groupLabelFor(k)};}));\n    const dayChips = chipList.map((c) => {\n      const active = this.state.activeDayKey===c.key;\n      return {\n        label: c.label,\n        onClick: () => this.setState({ activeDayKey: c.key }),\n        bg: active ? 'var(--cube-blue)' : 'transparent',\n        borderColor: active ? 'var(--cube-blue)' : '#cfcfcf',\n        textColor: active ? 'var(--cube-white)' : 'var(--cube-gray-text)',\n        weight: active ? '700' : '400'\n      };\n    });\n\n    const filtered = this.currentFilteredEntries();\n    const meetingCount = filtered.filter(function(e){return e.type==='meeting' && !e.done;}).length;\n    const callCount = filtered.filter(function(e){return e.type==='call' && !e.done;}).length;\n\n    const sorted = filtered.slice().sort(function(a,b){\n      const ka = a.targetDateISO || '9999-99-99', kb = b.targetDateISO || '9999-99-99';\n      if(ka!==kb) return ka.localeCompare(kb);\n      return (a.done-b.done) || (timeToMinutes(a.time)-timeToMinutes(b.time));\n    });\n    const tableRows = sorted.map((e) => {\n      const cellBg = e.type==='meeting' ? 'rgba(232,163,61,0.16)' : (e.type==='call' ? 'rgba(51,187,255,0.14)' : (e.done ? 'transparent' : '#fbfbfb'));\n      return {\n        id: e.id,\n        done: e.done,\n        dateStr: e.targetDateISO ? isoToDMShort(e.targetDateISO) : '?',\n        time: e.time || '',\n        name: e.name || '(без назви)',\n        role: e.role || '',\n        contactName: e.contactName || '',\n        phone: e.phone || '',\n        telHref: e.phone ? ('tel:'+e.phone) : '',\n        details: e.details || '',\n        cellBg: cellBg,\n        rowOpacity: e.done ? 0.45 : 1,\n        strike: e.done ? 'line-through' : 'none',\n        onToggleDone: () => this.toggleDone(e.id),\n        onDelete: () => this.deleteEntry(e.id)\n      };\n    });\n\n    const modal = this.state.modal;\n\n    return {\n      clockTime, clockDate,\n      pasteZoneRef: this.pasteZoneRef,\n      handlePaste: this.handlePaste,\n      handlePasteZoneInput: this.handlePasteZoneInput,\n      pasteZoneEmpty: this.state.pasteZoneEmpty,\n      pasteStatusText: this.state.pasteStatusText,\n      pasteStatusColor: this.state.pasteStatusWarn ? 'var(--cube-warning)' : 'var(--cube-success)',\n      hasPreview: this.state.preview.length > 0,\n      previewRows,\n      commitPreview: this.commitPreview,\n      cancelPreview: this.cancelPreview,\n      resetPasteZone: this.resetPasteZone,\n      showEmptyHint: this.state.preview.length===0,\n      copyPlan: this.copyPlan,\n      meetingCount, callCount,\n      dayChips,\n      searchText: this.state.searchText,\n      onSearchChange: this.onSearchChange,\n      saveStatusText: this.state.saveStatusText,\n      clearAll: this.clearAll,\n      tableRows,\n      showEmptyBoardHint: tableRows.length===0,\n      emptyBoardHintText: 'Немає записів для цього фільтру.',\n\n      modalOpen: !!modal,\n      modalTitle: modal ? modal.title : '',\n      modalText: modal ? (modal.text || '') : '',\n      modalIsPlain: !!modal && modal.kind !== 'text',\n      modalIsText: !!modal && modal.kind === 'text',\n      modalIsConfirm: !!modal && modal.kind === 'confirm',\n      modalIsInfo: !!modal && modal.kind === 'info',\n      modalTextareaRef: this.modalTextareaRef,\n      modalTextareaValue: modal ? (modal.textareaValue || '') : '',\n      modalCopyHint: modal ? (modal.copyHint || '') : '',\n      showClearCopiedBtn: !!modal && modal.showClearCopied,\n      showTextFallbackBtn: !!modal && modal.showTextFallback,\n      onClearCopied: this.onClearCopied,\n      onShowTextFallback: this.onShowTextFallback,\n      onModalCopyClick: this.onModalCopyClick,\n      onConfirmClear: this.onConfirmClear,\n      closeModal: this.closeModal,\n      onOverlayClick: this.onOverlayClick,\n      stopProp: this.stopProp\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
